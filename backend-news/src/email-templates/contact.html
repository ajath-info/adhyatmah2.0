<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Contact Message - Adhyatmah</title>
    <style>
      body {
        font-family: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f8fafc;
        margin: 0;
        padding: 0;
        font-size: 14px;
        color: #1a202c;
        line-height: 1.6;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 0;
      }

      .email-wrapper {
        background-color: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      .header-banner {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 30px 20px;
        text-align: center;
        position: relative;
      }

      .logo {
        max-width: 120px;
        height: auto;
        filter: brightness(0) invert(1);
      }

      .main-content {
        padding: 30px 20px;
      }

      .greeting {
        font-size: 24px;
        font-weight: 700;
        color: #1a202c;
        margin: 0 0 20px 0;
        text-align: center;
      }

      .contact-box {
        background-color: #f8fafc;
        border: 2px solid #e5e7eb;
        border-radius: 12px;
        padding: 30px;
        margin: 30px 0;
      }

      .contact-title {
        font-size: 18px;
        font-weight: 600;
        color: #1a202c;
        margin: 0 0 20px 0;
        text-align: center;
      }

      .contact-details {
        margin: 20px 0;
      }

      .contact-item {
        display: flex;
        margin: 15px 0;
        padding: 15px;
        background-color: #ffffff;
        border-radius: 8px;
        border-left: 4px solid #667eea;
      }

      .contact-label {
        font-weight: 600;
        color: #374151;
        min-width: 80px;
        margin-right: 15px;
      }

      .contact-value {
        color: #1a202c;
        flex: 1;
      }

      .message-box {
        background-color: #ffffff;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        padding: 20px;
        margin: 20px 0;
      }

      .message-label {
        font-weight: 600;
        color: #374151;
        margin-bottom: 10px;
        display: block;
      }

      .message-content {
        color: #1a202c;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .notification-box {
        background-color: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 8px;
        padding: 15px;
        margin: 20px 0;
        text-align: center;
      }

      .notification-text {
        color: #166534;
        font-size: 13px;
        margin: 0;
        font-weight: 500;
      }

      .footer {
        background-color: #f8fafc;
        padding: 20px;
        text-align: center;
        border-top: 1px solid #e5e7eb;
      }

      .footer-text {
        color: #6b7280;
        font-size: 12px;
        margin: 0;
      }

      @media only screen and (max-width: 600px) {
        .container {
          margin: 0;
          border-radius: 0;
        }
        
        .email-wrapper {
          border-radius: 0;
        }
        
        .main-content {
          padding: 20px 15px;
        }
        
        .header-banner {
          padding: 20px 15px;
        }
        
        .greeting {
          font-size: 20px;
        }
        
        .contact-item {
          flex-direction: column;
        }
        
        .contact-label {
          min-width: auto;
          margin-right: 0;
          margin-bottom: 5px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="email-wrapper">
        <!-- Header Banner -->
        <div class="header-banner">
          <img
            src="https://pandit-ji-seven.vercel.app/_next/image?url=https%3A%2F%2Fres.cloudinary.com%2Fdmtkuwoaf%2Fimage%2Fupload%2Fv1758695655%2Flaeztwr1pneb1iaoom7v.png&w=1920&q=75"
            alt="Adhyatmah Logo"
            class="logo"
          />
        </div>

        <!-- Main Content -->
        <div class="main-content">
          <!-- Greeting -->
          <h1 class="greeting">New Contact Message 📩</h1>

          <!-- Contact Box -->
          <div class="contact-box">
            <h2 class="contact-title">Contact Form Submission</h2>
            
            <div class="contact-details">
              <div class="contact-item">
                <span class="contact-label">Name:</span>
                <span class="contact-value">{{name}}</span>
              </div>
              
              <div class="contact-item">
                <span class="contact-label">Email:</span>
                <span class="contact-value">{{email}}</span>
              </div>
              
              <div class="contact-item">
                <span class="contact-label">Phone:</span>
                <span class="contact-value">{{phone}}</span>
              </div>
            </div>

            <div class="message-box">
              <span class="message-label">Message:</span>
              <div class="message-content">{{message}}</div>
            </div>
          </div>

          <!-- Notification Box -->
          <div class="notification-box">
            <p class="notification-text">
              📧 A new contact message has been received through the Adhyatmah website contact form.
            </p>
          </div>
        </div>

        <!-- Footer -->
        <div class="footer">
          <p class="footer-text">
            <strong>Adhyatmah Contact System</strong> 🕉️<br>
            <a href="https://adhyatmah.com" style="color: #667eea; text-decoration: none;">www.adhyatmah.com</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
